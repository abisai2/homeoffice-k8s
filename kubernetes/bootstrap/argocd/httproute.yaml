# Expose the Argo CD UI/API through the shared Cilium Gateway (gateway ns). Argo CD is
# helm-installed at bootstrap with global.domain + server.insecure=true (TLS terminates at
# the Gateway), but the argo-cd chart creates no Gateway API route — so this attaches the
# argocd host to the Gateway's https listener. Route lives in the argocd ns alongside its
# backend (argocd-server), so no ReferenceGrant is needed; the https listener allows routes
# from all namespaces. Wildcard cert *.k8s-talos1.ap169homeoffice.net covers this host.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  parentRefs:
    - name: main
      namespace: gateway
      sectionName: https
  hostnames:
    - argocd.k8s-talos1.ap169homeoffice.net
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
