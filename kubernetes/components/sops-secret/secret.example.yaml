# PLAINTEXT TEMPLATE — never holds real values, stays in git as documentation.
# To add an encrypted secret to an app:
#   1. cp this file to kubernetes/apps/<app>/secret.sops.yaml and the generator + edit kustomization
#      (see ../README.md), then fill in REAL values.
#   2. task sops:encrypt -- kubernetes/apps/<app>/secret.sops.yaml   # encrypts in place (catch-all .sops.yaml rule)
#   3. commit secret.sops.yaml (ENCRYPTED) + secret.example.yaml (this placeholder); never commit a plaintext .sops.yaml.
# Argo's repo-server decrypts it at render time via KSOPS (see kubernetes/bootstrap/argocd/values.yaml);
# locally, `task sops:render -- kubernetes/apps/<app>` does the same.
apiVersion: v1
kind: Secret
metadata:
  name: example-secret
  namespace: default
type: Opaque
stringData:
  # Replace with the app's real keys. Example shapes:
  token: REPLACE_ME
  username: REPLACE_ME
  password: REPLACE_ME
