# KSOPS generator. kustomize (with the ksops exec plugin: `--enable-alpha-plugins
# --enable-exec`) runs `ksops`, which decrypts each referenced *.sops.yaml at build
# time and emits the resulting Secret into the kustomize output.
#
# Argo's repo-server has the plugin staged + SOPS_AGE_KEY_FILE wired
# (kubernetes/bootstrap/argocd/values.yaml). Locally: `task sops:render -- <dir>`.
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: sops-secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secret.sops.yaml
