# Announce the LB IPs over L2 (ARP) on the node interfaces.
# CiliumL2AnnouncementPolicy is still cilium.io/v2alpha1 in v1.19.4 (verified).
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default-l2
spec:
  loadBalancerIPs: true
  # Restrict to real NICs (Talos/VMware vmxnet3 = ens192 etc.).
  interfaces:
    - "^e.*"
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
