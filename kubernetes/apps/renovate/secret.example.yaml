# PLAINTEXT placeholder — documents the renovate secret shape. Real value lives
# ENCRYPTED in secret.sops.yaml. To set it:
#   cp kubernetes/apps/renovate/secret.example.yaml kubernetes/apps/renovate/secret.sops.yaml
#   $EDITOR kubernetes/apps/renovate/secret.sops.yaml   (fill value, then encrypt:)
#   task sops:encrypt -- kubernetes/apps/renovate/secret.sops.yaml
# Key:
#   - RENOVATE_TOKEN: the GitHub fine-grained PAT scoped to abisai2/homeoffice-k8s
#     (push+admin) — same value as ~/.credentials/api-tokens/github-renovate-homeoffice-k8s.token.
#     On platform=github this one token covers both repo writes and release-notes reads.
apiVersion: v1
kind: Secret
metadata:
  name: renovate-secrets
  namespace: renovate
type: Opaque
stringData:
  RENOVATE_TOKEN: REPLACE_WITH_GITHUB_FINE_GRAINED_PAT
