# KSOPS generator — emits renovate-secrets (RENOVATE_TOKEN for the CronJob).
# Pattern: kubernetes/components/sops-secret/README.md.
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: renovate-secrets-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secret.sops.yaml
