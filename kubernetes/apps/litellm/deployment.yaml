# LiteLLM proxy — OpenAI-compatible gateway (OpenRouter failover chain in
# config.yaml). Fresh instance, independent of the appservices01 docker stack:
# own master/salt keys, empty DB in the shared CNPG cluster (role + database in
# kubernetes/apps/cnpg-cluster/), NO Langfuse. Single replica — no Redis needed
# (LiteLLM only requires it for multi-instance routing state).
#
# The litellm-database image runs `prisma migrate deploy` against DATABASE_URL
# on startup (same mechanism the docker stack relies on), so there is no
# separate migrations Job; the startupProbe budget covers first-boot migration.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  labels:
    app.kubernetes.io/name: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
    spec:
      containers:
        - name: litellm
          # Tag pinned via the kustomization `images:` transformer (Renovate-tracked).
          image: ghcr.io/berriai/litellm-database:v1.88.1
          args: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
          ports:
            - name: http
              containerPort: 4000
          # LITELLM_MASTER_KEY / LITELLM_SALT_KEY / OPENROUTER_API_KEY / DATABASE_URL
          envFrom:
            - secretRef:
                name: litellm-secrets
          env:
            # Models added via the admin UI / POST /model/new persist to Postgres
            # (LiteLLM_ProxyModelTable) — they will NOT appear in config.yaml.
            - name: STORE_MODEL_IN_DB
              value: "True"
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          # kubelet-native httpGet probes — the Wolfi-based image ships no wget/curl,
          # which bit the docker stack's CMD-SHELL healthcheck; httpGet sidesteps it.
          startupProbe:
            httpGet:
              path: /health/liveliness
              port: http
            # First boot runs Prisma migrations (peak ~610MB RSS, ~2-3 min on the
            # docker stack) — allow up to 5 min before liveness takes over.
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              # The docker stack OOM-looped at 1g on first boot (Prisma migration +
              # uvicorn + node prisma engine); 2g has been stable since 2026-05-13.
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
spec:
  selector:
    app.kubernetes.io/name: litellm
  ports:
    - name: http
      port: 4000
      targetPort: http
