# Expose litellm through the shared Cilium Gateway (gateway ns). The Gateway's https
# listener allows routes from all namespaces, so this cross-namespace parentRef needs no
# ReferenceGrant; the backend Service (litellm:4000) is in this namespace. Wildcard cert
# *.k8s-talos1.ap169homeoffice.net (P7.2) covers this host; wildcard DNS already points
# at the Gateway LB (172.16.23.120).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: litellm
spec:
  parentRefs:
    - name: main
      namespace: gateway
      sectionName: https
  hostnames:
    - litellm.k8s-talos1.ap169homeoffice.net
  rules:
    - backendRefs:
        - name: litellm
          port: 4000
