# PLAINTEXT placeholder — documents the litellm secret shape. Real values live
# ENCRYPTED in secret.sops.yaml (first-time generation: ~/scripts/litellm-k8s-secrets.sh,
# disposable; afterwards edit via `task sops:edit -- kubernetes/apps/litellm/secret.sops.yaml`).
# Keys:
#   - LITELLM_MASTER_KEY: admin/bootstrap auth token, format `sk-<hex48>`
#     (`printf 'sk-%s' "$(openssl rand -hex 24)"`). Stashed on mgmt01 at
#     ~/.credentials/api-tokens/litellm-k8s.token. Independent of the docker
#     stack's litellm.token.
#   - LITELLM_SALT_KEY: `openssl rand -hex 32` — IMMUTABLE once any model is
#     stored in the DB (rotation breaks credentials encrypted at rest).
#   - OPENROUTER_API_KEY: same OpenRouter account as the docker stack —
#     value from ~/.credentials/api-tokens/openrouter.creds on mgmt01.
#   - DATABASE_URL: full Postgres URL incl. password. The password MUST equal
#     the litellm-db-role secret in kubernetes/apps/cnpg-cluster/
#     (secret-litellm-role.sops.yaml) — CNPG manages the role from that secret;
#     this URL is how the app authenticates with it.
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
  namespace: litellm
type: Opaque
stringData:
  LITELLM_MASTER_KEY: REPLACE_WITH_SK_HEX48
  LITELLM_SALT_KEY: REPLACE_WITH_OPENSSL_RAND_HEX_32
  OPENROUTER_API_KEY: REPLACE_WITH_OPENROUTER_KEY
  DATABASE_URL: postgresql://litellm:REPLACE_WITH_LITELLM_DB_PASSWORD@postgres-rw.databases.svc.cluster.local:5432/litellm
