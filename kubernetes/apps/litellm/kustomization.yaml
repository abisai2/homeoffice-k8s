apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: litellm
resources:
  - deployment.yaml
  - httproute.yaml
# Plain manifests, NOT the upstream litellm-helm chart: the chart is BETA and
# rand-generates the master key when masterkeySecretName is unset (offline-render
# churn hazard #2, UPDATE-RUNBOOK §3.2), and its chart version doesn't track the
# app version. The image tag below is the single version pin — Renovate's
# kustomize manager watches `images:` natively.
images:
  - name: ghcr.io/berriai/litellm-database
    newTag: v1.88.1
# Proxy routing config. Hash-suffixed name → Deployment re-rolls on config change.
configMapGenerator:
  - name: litellm-config
    files:
      - config.yaml
# litellm-secrets: LITELLM_MASTER_KEY, LITELLM_SALT_KEY, OPENROUTER_API_KEY,
# DATABASE_URL — see secret.example.yaml.
generators:
  - secret-generator.yaml
