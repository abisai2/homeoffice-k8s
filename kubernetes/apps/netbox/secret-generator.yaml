# KSOPS generator — emits netbox-secrets (consumed via the existingSecret knobs in
# values.yaml: config, superuser, and externalDatabase).
# Pattern: kubernetes/components/sops-secret/README.md.
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: netbox-secrets-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secret.sops.yaml
