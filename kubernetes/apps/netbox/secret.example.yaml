# PLAINTEXT placeholder — documents the netbox secret shape. Real values live
# ENCRYPTED in secret.sops.yaml. To set them:
#   cp kubernetes/apps/netbox/secret.example.yaml kubernetes/apps/netbox/secret.sops.yaml
#   $EDITOR kubernetes/apps/netbox/secret.sops.yaml   (fill values, then encrypt:)
#   task sops:encrypt -- kubernetes/apps/netbox/secret.sops.yaml
# Keys (ALL eight must exist — the chart's projected volume mounts them):
#   - secret_key: Django SECRET_KEY, >=50 chars, e.g. `openssl rand -base64 60 | tr -d '\n'`
#   - email_password: leave "" (no SMTP) — the KEY itself is mounted unconditionally;
#     removing it wedges pods in ContainerCreating
#   - api_token_peppers: JSON map of pepper id -> >=50-char value (NetBox 4.6 hashed
#     API tokens), e.g. '{"1": "<openssl rand -base64 48 | tr -d '\n'>"}'
#   - username/password/email: bootstrap superuser (password e.g. `openssl rand -base64 18`)
#   - api_token: superuser API token, `openssl rand -hex 20`
#   - postgresql-password: MUST equal the password in the cnpg-cluster netbox-db-role
#     secret (kubernetes/apps/cnpg-cluster/secret-netbox-role.sops.yaml)
apiVersion: v1
kind: Secret
metadata:
  name: netbox-secrets
  namespace: netbox
type: Opaque
stringData:
  secret_key: REPLACE_WITH_OPENSSL_RAND_B64_60
  email_password: ""
  api_token_peppers: '{"1": "REPLACE_WITH_OPENSSL_RAND_B64_48"}'
  username: admin
  password: REPLACE_WITH_SUPERUSER_PASSWORD
  email: REPLACE_WITH_ADMIN_EMAIL
  api_token: REPLACE_WITH_OPENSSL_RAND_HEX_20
  postgresql-password: REPLACE_WITH_NETBOX_DB_PASSWORD
