# Expose netbox through the shared Cilium Gateway (gateway ns). The Gateway's https
# listener allows routes from all namespaces, so this cross-namespace parentRef needs no
# ReferenceGrant; the backend (netbox, chart Service port 80 -> container 8080) is in
# this namespace. Wildcard cert *.k8s-talos1.ap169homeoffice.net (P7.2) covers this host.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: netbox
spec:
  parentRefs:
    - name: main
      namespace: gateway
      sectionName: https
  hostnames:
    - netbox.k8s-talos1.ap169homeoffice.net
  rules:
    - backendRefs:
        - name: netbox
          port: 80
