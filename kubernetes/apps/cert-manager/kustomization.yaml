apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    releaseName: cert-manager
    version: "v1.20.2"
    namespace: cert-manager
    valuesFile: values.yaml
resources:
  - cluster-issuer.yaml
# KSOPS-decrypted Cloudflare API token Secret (cert-manager ns) — see secret.example.yaml.
generators:
  - secret-generator.yaml
