# Let's Encrypt ACME ClusterIssuers solving DNS-01 via Cloudflare.
# Two issuers: validate against STAGING first (no rate limits, untrusted cert),
# then switch the wildcard Certificate (P7.2) to PROD once the flow works.
#
# Both reference the `cloudflare-api-token-secret` Secret (KSOPS-decrypted into the
# cert-manager namespace — the ClusterIssuer cluster-resource namespace). The token
# needs Cloudflare Zone:DNS:Edit + Zone:Zone:Read on ap169homeoffice.net.
# ACME email below is a placeholder — set the operator's real notification address.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@ap169homeoffice.net
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token-secret
              key: api-token
        selector:
          dnsZones:
            - ap169homeoffice.net
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@ap169homeoffice.net
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token-secret
              key: api-token
        selector:
          dnsZones:
            - ap169homeoffice.net
