# KSOPS generator — kustomize (with the ksops exec plugin) decrypts secret.sops.yaml
# at render time and emits the Cloudflare API token Secret. See
# kubernetes/components/sops-secret/README.md for the pattern.
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: cloudflare-api-token-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secret.sops.yaml
