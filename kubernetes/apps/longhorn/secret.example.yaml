# PLAINTEXT placeholder — documents the Longhorn Wasabi backup credential shape.
# Real values live ENCRYPTED in secret.sops.yaml. To set them:
#   task sops:edit -- kubernetes/apps/longhorn/secret.sops.yaml
# Use the homeoffice-k8s Wasabi keys (same account as the TF state backend; bucket
# homeoffice-k8s-backups, region us-east-1). AWS_ENDPOINTS is the Wasabi S3 endpoint.
apiVersion: v1
kind: Secret
metadata:
  name: longhorn-backup-credential
  namespace: longhorn-system
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: REPLACE_WITH_WASABI_ACCESS_KEY
  AWS_SECRET_ACCESS_KEY: REPLACE_WITH_WASABI_SECRET_KEY
  AWS_ENDPOINTS: https://s3.us-east-1.wasabisys.com
