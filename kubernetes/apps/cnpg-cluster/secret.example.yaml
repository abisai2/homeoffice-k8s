# PLAINTEXT placeholder — documents the CNPG Wasabi backup credential shape.
# Real values live ENCRYPTED in secret.sops.yaml. To set them:
#   task sops:edit -- kubernetes/apps/cnpg-cluster/secret.sops.yaml
# Use the homeoffice-k8s Wasabi keys (bucket homeoffice-k8s-backups, region us-east-1).
# AWS_REGION is not sensitive but the ObjectStore references it as a secret key.
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-backup-credential
  namespace: databases
type: Opaque
stringData:
  ACCESS_KEY_ID: REPLACE_WITH_WASABI_ACCESS_KEY
  ACCESS_SECRET_KEY: REPLACE_WITH_WASABI_SECRET_KEY
  AWS_REGION: us-east-1
