# 3-instance HA PostgreSQL (CloudNativePG). One instance per worker via soft
# pod anti-affinity (preferred — degrades gracefully during node maintenance /
# the single-host Veeam window). Storage on longhorn-r1 (replica-1: CNPG already
# replicates at the app layer via streaming replication, so Longhorn replication
# would be redundant). Backups via the Barman Cloud Plugin -> Wasabi (ObjectStore).
# PostgreSQL image is the operator default (imageName omitted; pin later if needed).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
spec:
  instances: 3
  storage:
    storageClass: longhorn-r1
    size: 10Gi
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: wasabi-store     # the ObjectStore below
        serverName: postgres               # backup folder name under the destination path
  # Declarative roles for app databases. Passwords come from per-role basic-auth
  # secrets; the same value lives in each app's own KSOPS secret — keep them in sync:
  #   - authentik (P7.6): authentik-db-role <-> authentik-secrets AUTHENTIK_POSTGRESQL__PASSWORD
  #     (authentik ns). Database created by database-authentik.yaml.
  #   - netbox: netbox-db-role <-> netbox-secrets postgresql-password (netbox ns).
  #     Database created by database-netbox.yaml.
  #   - litellm: litellm-db-role <-> litellm-secrets DATABASE_URL password (litellm ns).
  #     Database created by database-litellm.yaml.
  managed:
    roles:
      - name: authentik
        ensure: present
        login: true
        passwordSecret:
          name: authentik-db-role
      - name: netbox
        ensure: present
        login: true
        passwordSecret:
          name: netbox-db-role
      - name: litellm
        ensure: present
        login: true
        passwordSecret:
          name: litellm-db-role
