# KSOPS generator — emits this app's encrypted Secrets: the Wasabi S3 backup
# credential (ObjectStore) and the per-app DB role passwords (managed roles).
# Pattern: kubernetes/components/sops-secret/README.md.
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: cnpg-cluster-secrets
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secret.sops.yaml
  - secret-authentik-role.sops.yaml
  - secret-netbox-role.sops.yaml
  - secret-litellm-role.sops.yaml
