# Daily backup via the Barman Cloud Plugin. NOTE: CNPG cron is 6-FIELD (leading
# seconds, robfig/cron), NOT the 5-field Kubernetes CronJob format — "0 0 2 * * *"
# means 02:00:00 every day.
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres-daily
spec:
  schedule: "0 0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
