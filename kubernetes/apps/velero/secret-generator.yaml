# KSOPS generator — emits velero-credentials (key `cloud`, the AWS credentials file).
# Pattern: kubernetes/components/sops-secret/README.md.
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: velero-credentials-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secret.sops.yaml
