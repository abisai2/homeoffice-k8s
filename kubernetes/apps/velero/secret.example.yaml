# PLAINTEXT placeholder — documents the velero Wasabi credential ('cloud' = an AWS
# credentials file). Real values live ENCRYPTED in secret.sops.yaml. To set them:
#   task sops:edit -- kubernetes/apps/velero/secret.sops.yaml
# Use the homeoffice-k8s Wasabi keys (bucket homeoffice-k8s-backups, region us-east-1).
apiVersion: v1
kind: Secret
metadata:
  name: velero-credentials
  namespace: velero
type: Opaque
stringData:
  cloud: |
    [default]
    aws_access_key_id=REPLACE_WITH_WASABI_ACCESS_KEY
    aws_secret_access_key=REPLACE_WITH_WASABI_SECRET_KEY
