# KSOPS generator — emits the scoped talosconfig + Wasabi upload credential.
# Pattern: kubernetes/components/sops-secret/README.md.
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: etcd-backup-secrets-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secret-talosconfig.sops.yaml
  - secret-wasabi.sops.yaml
