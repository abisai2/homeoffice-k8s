# PLAINTEXT placeholders — document the two etcd-backup secrets. Real values live
# ENCRYPTED in secret-talosconfig.sops.yaml + secret-wasabi.sops.yaml.
#
# (1) Least-privilege talosconfig (role os:etcd:backup). Generate (operator):
#     talosctl --talosconfig talos/clusterconfig/talosconfig config new \
#       --roles os:etcd:backup --crt-ttl 8760h /tmp/etcd-backup.talosconfig
#     talosctl --talosconfig /tmp/etcd-backup.talosconfig \
#       config endpoint 172.16.23.31 172.16.23.32 172.16.23.33
#     task sops:edit -- kubernetes/apps/etcd-backup/secret-talosconfig.sops.yaml   # paste file content
# (2) Wasabi upload creds (bucket homeoffice-k8s-backups, region us-east-1):
#     task sops:edit -- kubernetes/apps/etcd-backup/secret-wasabi.sops.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: etcd-backup-talosconfig
  namespace: etcd-backup
type: Opaque
stringData:
  talosconfig: |
    REPLACE_WITH_SCOPED_TALOSCONFIG   # full talosctl config file (os:etcd:backup, with endpoints)
---
apiVersion: v1
kind: Secret
metadata:
  name: etcd-backup-wasabi
  namespace: etcd-backup
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: REPLACE_WITH_WASABI_ACCESS_KEY
  AWS_SECRET_ACCESS_KEY: REPLACE_WITH_WASABI_SECRET_KEY
