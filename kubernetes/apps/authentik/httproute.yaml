# Expose authentik through the shared Cilium Gateway (gateway ns). The Gateway's https
# listener allows routes from all namespaces, so this cross-namespace parentRef needs no
# ReferenceGrant; the backend (authentik-server) is in this namespace. Wildcard cert
# *.k8s-talos1.ap169homeoffice.net (P7.2) covers this host.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
spec:
  parentRefs:
    - name: main
      namespace: gateway
      sectionName: https
  hostnames:
    - authentik.k8s-talos1.ap169homeoffice.net
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
