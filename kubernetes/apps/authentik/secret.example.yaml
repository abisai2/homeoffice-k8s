# PLAINTEXT placeholder — documents the authentik secret env. Real values live
# ENCRYPTED in secret.sops.yaml. To set them:
#   task sops:edit -- kubernetes/apps/authentik/secret.sops.yaml
#   - AUTHENTIK_SECRET_KEY: generate a long random value, e.g. `openssl rand -base64 60`
#   - AUTHENTIK_POSTGRESQL__PASSWORD: MUST equal the password in the cnpg-cluster
#     authentik-db-role secret (kubernetes/apps/cnpg-cluster/secret-authentik-role.sops.yaml)
apiVersion: v1
kind: Secret
metadata:
  name: authentik-secrets
  namespace: authentik
type: Opaque
stringData:
  AUTHENTIK_SECRET_KEY: REPLACE_WITH_OPENSSL_RAND
  AUTHENTIK_POSTGRESQL__PASSWORD: REPLACE_WITH_AUTHENTIK_DB_PASSWORD
