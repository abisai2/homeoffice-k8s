apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: authentik
helmCharts:
  - name: authentik
    repo: https://charts.goauthentik.io
    releaseName: authentik
    version: "2026.5.2"
    namespace: authentik
    valuesFile: values.yaml
resources:
  - redis.yaml
  - media-pvc.yaml
  - httproute.yaml
# AUTHENTIK_SECRET_KEY + AUTHENTIK_POSTGRESQL__PASSWORD (injected via global.envFrom).
generators:
  - secret-generator.yaml
