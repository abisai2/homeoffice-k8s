# Applied to every node (control plane + worker). System disk + the Image Factory
# installer image (schematic 613e1592… = iscsi-tools + util-linux-tools for Longhorn),
# so an install/upgrade keeps the extensions the OVA template was built with.
machine:
  install:
    disk: /dev/sda
    image: factory.talos.dev/installer/613e1592b2da41ae5e265e8789429f22e121aab91cb4deb6bc3c0b6262961245:v1.13.3
